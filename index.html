<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Run Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-web.png">
    <link rel="apple-touch-icon" href="icon-iphone.png">
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper-color: #fffef0;
            --line-color: #e0d9c5;
            --margin-line: #ffadad;
        }

        body { 
            font-family: 'Kalam', cursive; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            min-height: 100dvh; 
            margin: 0; 
            background: #333; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            box-sizing: border-box;
        }

        .notebook-page { 
            background: var(--paper-color); 
            padding: 3rem 2rem; 
            border-radius: 5px; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            width: 85%;
            max-width: 400px;
            min-height: 450px;
            position: relative;
            background-image: repeating-linear-gradient(transparent, transparent 30px, var(--line-color) 30px, var(--line-color) 31px);
            line-height: 31px;
            overflow: hidden;
        }

        .notebook-page::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--margin-line);
        }

        .content {
            position: relative;
            padding-left: 30px; 
            z-index: 1;
        }

        /* The New Date Picker Styling */
        .date-picker {
            font-family: 'Indie Flower', cursive;
            font-size: 1.4rem;
            color: #2c3e50;
            background: transparent;
            border: none;
            border-bottom: 2px dashed #7f8c8d;
            outline: none;
            cursor: pointer;
            margin-bottom: 1rem;
            padding: 0;
            width: 100%;
        }

        /* Removes the default ugly calendar icon background on some browsers */
        .date-picker::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
        }

        h1 { 
            font-family: 'Indie Flower', cursive;
            color: #2c3e50; 
            margin: 0 0 0.5rem 0;
            text-decoration: underline;
            font-size: 2.2rem;
            margin-top: 1rem;
        }

        h2 {
            font-family: 'Indie Flower', cursive;
            color: #7f8c8d;
            margin: 2rem 0 0.2rem 0;
            font-size: 1.5rem;
        }

        .workout { 
            font-weight: 700; 
            font-size: 1.6rem; 
            color: #1a1a1a; 
            transform: rotate(-1deg); 
            line-height: 1.4;
        }

        .tomorrow-workout {
            font-size: 1.3rem;
            color: #555;
            transform: rotate(1deg);
        }

        .week-marker {
            position: absolute;
            top: -10px;
            right: 20px;
            background: #ffeb3b; 
            padding: 5px 15px;
            transform: rotate(3deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            font-weight: bold;
            color: #333;
            border: 1px solid #f9d71c;
            z-index: 10;
            font-family: 'Indie Flower', cursive;
            font-size: 1.2rem;
        }

        .complete-btn {
            margin-top: 30px;
            padding: 10px 20px;
            font-family: 'Indie Flower', cursive;
            font-size: 1.2rem;
            background: transparent;
            border: 2px solid #2c3e50;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .complete-btn:active {
            transform: scale(0.95);
            background: #e0d9c5;
        }

        .undo-btn {
            margin-top: 15px;
            padding: 5px 15px;
            font-family: 'Indie Flower', cursive;
            font-size: 1.1rem;
            background: transparent;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            text-decoration: underline;
            display: none; 
        }

        #done-stamp {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 6rem;
            color: rgba(255, 0, 0, 0.4); 
            border: 8px solid rgba(255, 0, 0, 0.4);
            padding: 10px 30px;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 5px;
            display: none; 
            pointer-events: none; 
            z-index: 20;
        }

        .completed .workout {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .fidget {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: #87CEEB; 
            border-radius: 50%;
            border: 2px solid #2c3e50;
            box-shadow: 3px 3px 0px #2c3e50;
            cursor: pointer;
            z-index: 15;
            transition: transform 0.05s, box-shadow 0.05s, background 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }

        .fidget.pressed {
            transform: translate(3px, 3px) rotate(15deg);
            box-shadow: 0px 0px 0px #2c3e50;
            background: #ffadad; 
        }
    </style>
</head>
<body>
    <div class="notebook-page" id="page">
        <div id="done-stamp">DONE</div>
        <div id="week-display" class="week-marker">Week --</div>
        
        <div class="fidget" id="fidget-btn">🌀</div>

        <div class="content">
            <input type="date" id="run-date" class="date-picker">
            
            <h1 id="day-one-header">Today:</h1>
            <div id="workout-display" class="workout">Loading...</div>
            <button class="complete-btn" onclick="markComplete()">Mark Finished</button>
            <button class="undo-btn" onclick="undoComplete()">Wait, Undo!</button>

            <h2 id="day-two-header">Tomorrow:</h2>
            <div id="tomorrow-display" class="tomorrow-workout">Loading...</div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'schedule.csv';
        const dateInput = document.getElementById('run-date');

        // Set the date picker to the current local date on first load
        const now = new Date();
        const localDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
        dateInput.value = localDate.toISOString().split('T')[0];

        // Re-run the app whenever the user picks a new date
        dateInput.addEventListener('change', getWorkout);

        // Helper to format the UI based on selection
        function updateHeaders(selectedDateStr) {
            const todayStr = (now.getMonth() + 1) + '/' + now.getDate() + '/' + now.getFullYear();
            if (selectedDateStr === todayStr) {
                document.getElementById('day-one-header').innerText = "Today:";
                document.getElementById('day-two-header').innerText = "Tomorrow:";
            } else {
                document.getElementById('day-one-header').innerText = "Selected:";
                document.getElementById('day-two-header').innerText = "Next Day:";
            }
        }

        // Returns the string formatted perfectly for the CSV (M/D/YYYY)
        function getFormattedSelectedDate() {
            const [y, m, d] = dateInput.value.split('-');
            return parseInt(m) + '/' + parseInt(d) + '/' + y;
        }

        async function getWorkout() {
            const selectedDateStr = getFormattedSelectedDate();
            
            // Calculate "Next Day"
            const [y, m, d] = dateInput.value.split('-');
            const nextDayObj = new Date(y, parseInt(m) - 1, d);
            nextDayObj.setDate(nextDayObj.getDate() + 1);
            const nextDayStr = (nextDayObj.getMonth() + 1) + '/' + nextDayObj.getDate() + '/' + nextDayObj.getFullYear();

            updateHeaders(selectedDateStr);

            // Reset UI before checking completion
            document.getElementById('page').classList.remove('completed');
            document.getElementById('done-stamp').style.display = 'none';
            document.querySelector('.complete-btn').style.display = 'inline-block';
            document.querySelector('.undo-btn').style.display = 'none';

            if (localStorage.getItem('completed_' + selectedDateStr)) {
                showCompletionUI();
            }

            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error("File not found");
                
                const data = await response.text();
                const rows = data.split('\n');
                
                let todayMatch = null;
                let tomorrowMatch = null;

                for (let i = 1; i < rows.length; i++) { 
                    const cols = rows[i].split(',');
                    if (cols.length >= 3) {
                        if (cols[0].trim() === selectedDateStr) todayMatch = cols;
                        if (cols[0].trim() === nextDayStr) tomorrowMatch = cols;
                    }
                }

                if (todayMatch) {
                    document.getElementById('week-display').innerText = "Week " + todayMatch[1].trim();
                    const workoutText = todayMatch.slice(2).join(',').replace(/"/g, '').trim();
                    document.getElementById('workout-display').innerText = workoutText;
                } else {
                    document.getElementById('workout-display').innerText = "Rest Day! ☕";
                    if(tomorrowMatch) document.getElementById('week-display').innerText = "Week " + tomorrowMatch[1].trim();
                    else document.getElementById('week-display').innerText = "Relax";
                }

                if (tomorrowMatch) {
                    const tomWorkoutText = tomorrowMatch.slice(2).join(',').replace(/"/g, '').trim();
                    document.getElementById('tomorrow-display').innerText = tomWorkoutText;
                } else {
                    document.getElementById('tomorrow-display').innerText = "Rest Day! 💤";
                }

            } catch (e) {
                console.error(e);
                document.getElementById('workout-display').innerText = "Could not find schedule.csv";
                document.getElementById('tomorrow-display').innerText = "---";
            }
        }

        function markComplete() {
            const selectedDateStr = getFormattedSelectedDate();
            localStorage.setItem('completed_' + selectedDateStr, 'true');
            showCompletionUI();
        }

        function undoComplete() {
            const selectedDateStr = getFormattedSelectedDate();
            localStorage.removeItem('completed_' + selectedDateStr);
            document.getElementById('page').classList.remove('completed');
            document.getElementById('done-stamp').style.display = 'none';
            document.querySelector('.complete-btn').style.display = 'inline-block';
            document.querySelector('.undo-btn').style.display = 'none';
        }

        function showCompletionUI() {
            document.getElementById('page').classList.add('completed');
            document.getElementById('done-stamp').style.display = 'block';
            document.querySelector('.complete-btn').style.display = 'none';
            document.querySelector('.undo-btn').style.display = 'inline-block';
        }

        // --- Fidget Button Logic ---
        const fidgetBtn = document.getElementById('fidget-btn');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);

            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.05);
        }

        function pressDown(e) {
            e.preventDefault(); 
            fidgetBtn.classList.add('pressed');
            playClickSound();
            if (navigator.vibrate) navigator.vibrate(40); 
        }

        function releaseUp(e) {
            e.preventDefault();
            fidgetBtn.classList.remove('pressed');
        }

        fidgetBtn.addEventListener('touchstart', pressDown, { passive: false });
        fidgetBtn.addEventListener('touchend', releaseUp);
        fidgetBtn.addEventListener('touchcancel', releaseUp);
        fidgetBtn.addEventListener('mousedown', pressDown);
        fidgetBtn.addEventListener('mouseup', releaseUp);
        fidgetBtn.addEventListener('mouseleave', releaseUp); 

        // Run on load
        getWorkout();
    </script>
</body>
</html>
