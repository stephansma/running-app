<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Run Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-web.png">
    <link rel="apple-touch-icon" href="icon-iphone.png">
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper-color: #fffef0;
            --line-color: #e0d9c5;
            --margin-line: #ffadad;
        }

        body { 
            font-family: 'Kalam', cursive; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            min-height: 100dvh; 
            margin: 0; 
            background: #333; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            box-sizing: border-box;
        }

        .notebook-page { 
            background: var(--paper-color); 
            padding: 3rem 2rem; 
            border-radius: 5px; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            width: 85%;
            max-width: 400px;
            min-height: 480px; 
            position: relative;
            background-image: repeating-linear-gradient(transparent, transparent 30px, var(--line-color) 30px, var(--line-color) 31px);
            line-height: 31px;
            overflow: hidden;
        }

        .notebook-page::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--margin-line);
        }

        .content {
            position: relative;
            padding-left: 30px; 
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .date-picker {
            font-family: 'Indie Flower', cursive;
            font-size: 1.4rem;
            color: #2c3e50;
            background: transparent;
            border: none;
            border-bottom: 2px dashed #7f8c8d;
            outline: none;
            cursor: pointer;
            margin-bottom: 1rem;
            padding: 0;
            width: 100%;
        }

        .date-picker::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
        }

        h1 { 
            font-family: 'Indie Flower', cursive;
            color: #2c3e50; 
            margin: 0 0 0.5rem 0;
            text-decoration: underline;
            font-size: 2.2rem;
            margin-top: 1rem;
        }

        h2 {
            font-family: 'Indie Flower', cursive;
            color: #7f8c8d;
            margin: 2rem 0 0.2rem 0;
            font-size: 1.5rem;
        }

        .workout-container {
            position: relative;
            width: 100%;
            min-height: 50px; 
            margin-bottom: 10px;
        }

        .workout { 
            font-weight: 700; 
            font-size: 1.6rem; 
            color: #1a1a1a; 
            transform: rotate(-1deg); 
            line-height: 1.4;
        }

        #done-stamp {
            position: absolute;
            top: 50%;
            left: 45%; 
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 3.5rem; 
            color: rgba(192, 57, 43, 0.85); 
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 6px;
            display: none; 
            pointer-events: none; 
            z-index: 20;
            mix-blend-mode: multiply; 
            text-shadow: 0px 0px 3px rgba(192, 57, 43, 0.5); 
        }

        .completed #done-stamp {
            animation: stamp-slam 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes stamp-slam {
            0% { transform: translate(-50%, -50%) scale(2.5) rotate(-5deg); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(0.9) rotate(-18deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(-15deg); }
        }

        .tomorrow-workout {
            font-size: 1.3rem;
            color: #555;
            transform: rotate(1deg);
        }

        .week-marker {
            position: absolute;
            top: -10px;
            right: 20px;
            background: #ffeb3b; 
            padding: 5px 15px;
            transform: rotate(3deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            font-weight: bold;
            color: #333;
            border: 1px solid #f9d71c;
            z-index: 10;
            font-family: 'Indie Flower', cursive;
            font-size: 1.2rem;
        }

        .complete-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-family: 'Indie Flower', cursive;
            font-size: 1.2rem;
            background: transparent;
            border: 2px solid #2c3e50;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.1s;
            align-self: flex-start;
        }

        .complete-btn:active {
            transform: scale(0.95);
            background: #e0d9c5;
        }

        .log-form {
            margin-top: 15px;
            display: none;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #bdc3c7; 
        }

        .log-input-row {
            font-size: 1.3rem;
            color: #2c3e50;
        }

        .distance-input {
            font-family: 'Kalam', cursive;
            font-size: 1.2rem;
            width: 70px;
            text-align: center;
            background: transparent;
            border: none;
            border-bottom: 2px solid #2c3e50;
            outline: none;
            color: #e74c3c;
            font-weight: bold;
        }

        .emoji-group {
            display: flex;
            gap: 15px;
            font-size: 2rem;
        }

        .emoji-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0.4;
            transition: transform 0.2s, opacity 0.2s;
            padding: 0;
            filter: grayscale(100%);
        }

        .emoji-btn.selected {
            opacity: 1;
            transform: scale(1.3);
            filter: grayscale(0%);
        }

        .save-log-btn {
            font-family: 'Indie Flower', cursive;
            font-size: 1.2rem;
            font-weight: bold;
            background: #27ae60; 
            color: #fffef0;
            border: 2px solid #2ecc71;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            box-shadow: 3px 3px 0px rgba(46, 204, 113, 0.3); 
            transition: all 0.1s;
        }

        .save-log-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px rgba(46, 204, 113, 0.3);
        }

        .logged-stats {
            font-family: 'Kalam', cursive;
            font-size: 1.3rem;
            color: #e74c3c;
            margin-top: 15px;
            display: none;
            transform: rotate(-1deg);
            line-height: 1.4; 
        }

        .completed .workout {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .fidget {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: #F54927; /* <-- CHANGED TO ORANGE */
            border-radius: 50%;
            border: 2px solid #2c3e50;
            box-shadow: 3px 3px 0px #2c3e50;
            cursor: pointer;
            z-index: 15;
            transition: transform 0.05s, box-shadow 0.05s, background 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }

        .fidget.pressed {
            transform: translate(3px, 3px) rotate(15deg);
            box-shadow: 0px 0px 0px #2c3e50;
            background: #ffadad; 
        }

        .bottom-actions {
            margin-top: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .export-link {
            font-family: 'Indie Flower', cursive;
            font-size: 1.1rem;
            color: #7f8c8d;
            background: none;
            border: none;
            text-decoration: none;
            cursor: pointer;
            padding: 0;
        }

        .undo-btn {
            font-family: 'Indie Flower', cursive;
            font-size: 1.1rem;
            font-weight: bold;
            background: transparent; 
            border: none; 
            color: #c0392b; 
            cursor: pointer;
            text-decoration: none; 
            display: none; 
            transition: opacity 0.1s, transform 0.1s;
            padding: 0;
        }

        .undo-btn:active {
            opacity: 0.5; 
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="notebook-page" id="page">
        <div id="week-display" class="week-marker">Week --</div>
        
        <div class="fidget" id="fidget-btn">🌀</div>

        <div class="content">
            <input type="date" id="run-date" class="date-picker">
            
            <h1 id="day-one-header">Today:</h1>
            
            <div class="workout-container">
                <div id="workout-display" class="workout">Loading...</div>
                <div id="done-stamp">DONE</div>
            </div>
            
            <button class="complete-btn" onclick="openLogForm()">Mark Finished</button>

            <div class="log-form" id="log-form">
                <div class="log-input-row">
                    Distance: <input type="number" step="0.1" id="run-distance" class="distance-input" placeholder="0.0"> km
                </div>
                <div class="emoji-group">
                    <button class="emoji-btn selected" onclick="selectEmoji(this, '🤩')">🤩</button>
                    <button class="emoji-btn" onclick="selectEmoji(this, '🙂')">🙂</button>
                    <button class="emoji-btn" onclick="selectEmoji(this, '🥵')">🥵</button>
                </div>
                <button class="save-log-btn" onclick="saveLog()">Save Log</button>
            </div>

            <div id="logged-stats" class="logged-stats"></div>

            <h2 id="day-two-header">Tomorrow:</h2>
            <div id="tomorrow-display" class="tomorrow-workout">Loading...</div>

            <div class="bottom-actions">
                <button class="export-link" onclick="exportData()">Export Log 📥</button>
                <button class="undo-btn" onclick="undoComplete()">Wait, Undo! ⏪</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdZddkciE_kDBzdCyG-FyQ6gTqa7DW_WReNlD7aU4_sNw7ZbwKV9VXISPGgGY4-4zJbeu-u51SaLiJ/pub?gid=987654321&single=true&output=csv';
        const dateInput = document.getElementById('run-date');
        let selectedFeeling = '🤩'; 

        const now = new Date();
        const localDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
        dateInput.value = localDate.toISOString().split('T')[0];
        dateInput.addEventListener('change', getWorkout);

        function updateHeaders(selectedDateStr) {
            const todayStr = (now.getMonth() + 1) + '/' + now.getDate() + '/' + now.getFullYear();
            if (selectedDateStr === todayStr) {
                document.getElementById('day-one-header').innerText = "Today:";
                document.getElementById('day-two-header').innerText = "Tomorrow:";
            } else {
                document.getElementById('day-one-header').innerText = "Selected:";
                document.getElementById('day-two-header').innerText = "Next Day:";
            }
        }

        function getFormattedSelectedDate() {
            const [y, m, d] = dateInput.value.split('-');
            return parseInt(m) + '/' + parseInt(d) + '/' + y;
        }

        async function getWorkout() {
            const selectedDateStr = getFormattedSelectedDate();
            
            const [y, m, d] = dateInput.value.split('-');
            const nextDayObj = new Date(y, parseInt(m) - 1, d);
            nextDayObj.setDate(nextDayObj.getDate() + 1);
            const nextDayStr = (nextDayObj.getMonth() + 1) + '/' + nextDayObj.getDate() + '/' + nextDayObj.getFullYear();

            updateHeaders(selectedDateStr);

            document.getElementById('page').classList.remove('completed');
            document.getElementById('done-stamp').style.display = 'none';
            document.querySelector('.complete-btn').style.display = 'inline-block';
            document.querySelector('.undo-btn').style.display = 'none';
            document.getElementById('log-form').style.display = 'none';
            document.getElementById('logged-stats').style.display = 'none';

            const savedData = localStorage.getItem('completed_' + selectedDateStr);
            if (savedData) {
                try {
                    const parsedLog = JSON.parse(savedData);
                    showCompletionUI(parsedLog);
                } catch(e) {
                    localStorage.removeItem('completed_' + selectedDateStr);
                }
            }

            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error("File not found");
                
                const data = await response.text();
                const rows = data.split('\n');
                
                let todayMatch = null;
                let tomorrowMatch = null;

                for (let i = 1; i < rows.length; i++) { 
                    const cols = rows[i].split(',');
                    if (cols.length >= 3) {
                        if (cols[0].trim() === selectedDateStr) todayMatch = cols;
                        if (cols[0].trim() === nextDayStr) tomorrowMatch = cols;
                    }
                }

                if (todayMatch) {
                    document.getElementById('week-display').innerText = "Week " + todayMatch[1].trim();
                    const workoutText = todayMatch.slice(2).join(',').replace(/"/g, '').trim();
                    document.getElementById('workout-display').innerText = workoutText;
                } else {
                    document.getElementById('workout-display').innerText = "Rest Day! ☕";
                    if(tomorrowMatch) document.getElementById('week-display').innerText = "Week " + tomorrowMatch[1].trim();
                    else document.getElementById('week-display').innerText = "Relax";
                }

                if (tomorrowMatch) {
                    const tomWorkoutText = tomorrowMatch.slice(2).join(',').replace(/"/g, '').trim();
                    document.getElementById('tomorrow-display').innerText = tomWorkoutText;
                } else {
                    document.getElementById('tomorrow-display').innerText = "Rest Day! 💤";
                }

            } catch (e) {
                console.error(e);
                document.getElementById('workout-display').innerText = "Could not find schedule.csv";
                document.getElementById('tomorrow-display').innerText = "---";
            }
        }

        function openLogForm() {
            document.querySelector('.complete-btn').style.display = 'none';
            document.getElementById('log-form').style.display = 'flex';
        }

        function selectEmoji(btn, emoji) {
            selectedFeeling = emoji;
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function saveLog() {
            const selectedDateStr = getFormattedSelectedDate();
            const distanceInput = document.getElementById('run-distance').value;
            const finalDistance = distanceInput ? distanceInput : '--';

            const logData = {
                completed: true,
                distance: finalDistance,
                feel: selectedFeeling
            };

            localStorage.setItem('completed_' + selectedDateStr, JSON.stringify(logData));
            showCompletionUI(logData);
        }

        function showCompletionUI(logData) {
            document.getElementById('page').classList.add('completed');
            document.getElementById('done-stamp').style.display = 'block';
            document.querySelector('.complete-btn').style.display = 'none';
            document.getElementById('log-form').style.display = 'none';
            document.querySelector('.undo-btn').style.display = 'inline-block';

            if (logData) {
                const statsDiv = document.getElementById('logged-stats');
                const dist = logData.distance !== undefined ? logData.distance : '--';
                
                let htmlString = '';
                if (dist !== '--') {
                    htmlString += `Logged: ${dist} km`;
                }
                if (logData.feel) {
                    if (htmlString !== '') htmlString += `<br>`;
                    htmlString += `Feeling: ${logData.feel}`;
                }

                if (htmlString !== '') {
                    statsDiv.innerHTML = htmlString;
                    statsDiv.style.display = 'block';
                }
            }
        }

        function undoComplete() {
            const selectedDateStr = getFormattedSelectedDate();
            localStorage.removeItem('completed_' + selectedDateStr);
            
            document.getElementById('page').classList.remove('completed');
            document.getElementById('done-stamp').style.display = 'none';
            document.querySelector('.complete-btn').style.display = 'inline-block';
            document.querySelector('.undo-btn').style.display = 'none';
            document.getElementById('logged-stats').style.display = 'none';

            document.getElementById('run-distance').value = '';
            document.querySelectorAll('.emoji-btn')[0].click(); 
        }

        function exportData() {
            let csvContent = "Date,Distance (km),Feeling\n";
            let logs = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('completed_')) {
                    const dateStr = key.replace('completed_', '');
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        logs.push({ 
                            dateObj: new Date(dateStr), 
                            dateStr: dateStr, 
                            distance: data.distance || '', 
                            feel: data.feel || '' 
                        });
                    } catch(e) {
                    }
                }
            }
            
            if(logs.length === 0) {
                alert("No runs logged yet! Finish a run to start your history.");
                return;
            }

            logs.sort((a, b) => a.dateObj - b.dateObj);
            
            logs.forEach(log => {
                csvContent += `${log.dateStr},${log.distance},${log.feel}\n`;
            });
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "My_Running_Log.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        const fidgetBtn = document.getElementById('fidget-btn');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);

            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.05);
        }

        function pressDown(e) {
            e.preventDefault(); 
            fidgetBtn.classList.add('pressed');
            playClickSound();
            if (navigator.vibrate) navigator.vibrate(40); 
        }

        function releaseUp(e) {
            e.preventDefault();
            fidgetBtn.classList.remove('pressed');
        }

        fidgetBtn.addEventListener('touchstart', pressDown, { passive: false });
        fidgetBtn.addEventListener('touchend', releaseUp);
        fidgetBtn.addEventListener('touchcancel', releaseUp);
        fidgetBtn.addEventListener('mousedown', pressDown);
        fidgetBtn.addEventListener('mouseup', releaseUp);
        fidgetBtn.addEventListener('mouseleave', releaseUp); 

        getWorkout();
    </script>
</body>
</html>
