<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-web.png">
    <link rel="apple-touch-icon" href="icon-iphone.png">
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-color: #fffef0;
            --line-color: #e0d9c5;
            --margin-line: #ffadad;
        }

        body { 
            font-family: 'Kalam', cursive; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #333; 
        }

        .notebook-page { 
            background: var(--paper-color); 
            padding: 3rem 2rem; 
            border-radius: 5px; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            width: 85%;
            max-width: 400px;
            min-height: 450px;
            position: relative;
            background-image: repeating-linear-gradient(transparent, transparent 30px, var(--line-color) 30px, var(--line-color) 31px);
            line-height: 31px;
            overflow: hidden; /* Keeps the stamp from overflowing */
        }

        .notebook-page::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--margin-line);
        }

        .content {
            position: relative;
            padding-left: 30px; 
            z-index: 1;
        }

        h1 { 
            font-family: 'Indie Flower', cursive;
            color: #2c3e50; 
            margin: 0 0 0.5rem 0;
            text-decoration: underline;
            font-size: 2.2rem;
            margin-top: 1.5rem;
        }

        h2 {
            font-family: 'Indie Flower', cursive;
            color: #2c3e50;
            margin: 2rem 0 0.2rem 0;
            font-size: 1.5rem;
        }

        p#current-date { 
            font-size: 1.1rem; 
            color: #7f8c8d; 
            margin-bottom: 1rem;
        }

        .workout { 
            font-weight: 700; 
            font-size: 1.6rem; 
            color: #1a1a1a; 
            transform: rotate(-1deg); 
            line-height: 1.4;
        }

        .tomorrow-workout {
            font-size: 1.3rem;
            color: #1a1a1a;
            transform: rotate(1deg);
        }

        .week-marker {
            position: absolute;
            top: -10px;
            right: 20px;
            background: #ffeb3b; 
            padding: 5px 15px;
            transform: rotate(3deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            font-weight: bold;
            color: #333;
            border: 1px solid #f9d71c;
            z-index: 10;
            font-family: 'Indie Flower', cursive;
            font-size: 1.2rem;
        }

        .complete-btn {
            margin-top: 30px;
            padding: 10px 20px;
            font-family: 'Indie Flower', cursive;
            font-size: 1.2rem;
            background: transparent;
            border: 2px solid #2c3e50;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .complete-btn:active {
            transform: scale(0.95);
            background: #e0d9c5;
        }

        #done-stamp {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 6rem;
            color: rgba(255, 0, 0, 0.4); 
            border: 8px solid rgba(255, 0, 0, 0.4);
            padding: 10px 30px;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 5px;
            display: none; 
            pointer-events: none; 
            z-index: 20;
        }

        .completed .workout {
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* The Fidget Button! */
        .fidget {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: ##ffeb3b; /* corn yellow sticker */
            border-radius: 50%;
            border: 2px solid #2c3e50;
            box-shadow: 3px 3px 0px #2c3e50;
            cursor: pointer;
            z-index: 15;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            user-select: none; /* Prevents highlighting text when mashing */
        }

        /* The "Pressed" state */
        .fidget:active {
            transform: translate(3px, 3px) rotate(15deg);
            box-shadow: 0px 0px 0px #2c3e50;
            background: #ffadad; /* Changes color when squeezed */
        }
    </style>
</head>
<body>
    <div class="notebook-page" id="page">
        <div id="done-stamp">DONE</div>
        <div id="week-display" class="week-marker">Week --</div>
        
        <div class="fidget" id="fidget-btn">🌀</div>

        <div class="content">
            <p id="current-date">Loading...</p>
            
            <h1>Today:</h1>
            <div id="workout-display" class="workout">Loading...</div>
            <button class="complete-btn" onclick="markComplete()">Mark Finished</button>

            <h2>Tomorrow:</h2>
            <div id="tomorrow-display" class="tomorrow-workout">Loading...</div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdZddkciE_kDBzdCyG-FyQ6gTqa7DW_WReNlD7aU4_sNw7ZbwKV9VXISPGgGY4-4zJbeu-u51SaLiJ/pub?gid=987654321&single=true&output=csv';

        async function getWorkout() {
            // Get Today
            const d = new Date();
            const today = (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
            
            // Get Tomorrow
            const t = new Date(d);
            t.setDate(t.getDate() + 1); // Automatically handles month/year rollover
            const tomorrow = (t.getMonth() + 1) + '/' + t.getDate() + '/' + t.getFullYear();
            
            document.getElementById('current-date').innerText = "Date: " + today;

            if (localStorage.getItem('completed_' + today)) {
                showCompletionUI();
            }

            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error("File not found");
                
                const data = await response.text();
                const rows = data.split('\n');
                
                let todayMatch = null;
                let tomorrowMatch = null;

                for (let i = 1; i < rows.length; i++) { 
                    const cols = rows[i].split(',');
                    if (cols.length >= 3) {
                        if (cols[0].trim() === today) todayMatch = cols;
                        if (cols[0].trim() === tomorrow) tomorrowMatch = cols;
                    }
                }

                // Populate Today
                if (todayMatch) {
                    document.getElementById('week-display').innerText = "Week " + todayMatch[1].trim();
                    const workoutText = todayMatch.slice(2).join(',').replace(/"/g, '').trim();
                    document.getElementById('workout-display').innerText = workoutText;
                } else {
                    document.getElementById('workout-display').innerText = "Rest Day! ☕";
                    // If no run today, try to get the week from tomorrow's run so the sticky note isn't blank
                    if(tomorrowMatch) document.getElementById('week-display').innerText = "Week " + tomorrowMatch[1].trim();
                }

                // Populate Tomorrow
                if (tomorrowMatch) {
                    const tomWorkoutText = tomorrowMatch.slice(2).join(',').replace(/"/g, '').trim();
                    document.getElementById('tomorrow-display').innerText = tomWorkoutText;
                } else {
                    document.getElementById('tomorrow-display').innerText = "Rest Day! 💤";
                }

            } catch (e) {
                console.error(e);
                document.getElementById('workout-display').innerText = "Could not find schedule.csv";
                document.getElementById('tomorrow-display').innerText = "---";
            }
        }

        function markComplete() {
            const d = new Date();
            const today = (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
            localStorage.setItem('completed_' + today, 'true');
            showCompletionUI();
        }

        function showCompletionUI() {
            document.getElementById('page').classList.add('completed');
            document.getElementById('done-stamp').style.display = 'block';
            const btn = document.querySelector('.complete-btn');
            if(btn) btn.style.display = 'none';
        }

        // Optional logic for the fidget button if you want it to do more than just CSS
        function playFidget() {
            // Right now, the CSS handles the visual "squish" and color change automatically!
            // You can add sounds or a vibration effect here later if you want.
            if (navigator.vibrate) {
                navigator.vibrate(50); // Gives a tiny physical buzz on Android phones
            }
        }

        getWorkout();
    </script>
</body>
</html>
